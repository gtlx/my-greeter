[log]
enable = false
path = "/tmp/my-greeter.log"

[auth]
default_user = "gtlx"
auto_login = false

[branding]
title = "gtlx's machine"

[theme]
# 布局模式: "auto"=根据宽度自适应, "horizontal"=始终水平, "vertical"=始终垂直
layout = "auto"
title = "cyan bold"
separator = "dark gray"
border = "white"
border_focus = "#FFA500"
text = "white"
text_focus = "#FFA500"
plugin = "green"
hint = "dark gray"
error = "red bold"
session = "dark gray"
session_focus = "white bold"
panel_title = "cyan bold"
accent = "#FFA500"
# 旧版点阵背景: ""=无, "dark gray"=灰色点阵, "none"=无
background = ""
# ASCII 图案背景: 图案文件名(不含.txt), 空=禁用
# 也可以用文件路径: "/path/to/pattern.txt" 或 "./my.txt"
background_pattern = "arch"
# 图案文件所在目录（相对或绝对路径，默认 "patterns"）
background_pattern_dir = "patterns"
# 图案绘制样式（建议用暗色，形成水印效果）
background_style = "dark gray"
